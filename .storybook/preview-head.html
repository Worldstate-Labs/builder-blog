<!--
  The app loads Geist / Geist Mono / Newsreader via next/font and exposes them
  as the --font-* CSS variables that globals.css consumes. next/font does not
  run outside Next, so we load the same families from Google Fonts here and
  define the variables on :root. globals.css never sets these variables itself
  (it only reads them), so there is no conflict.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Newsreader:opsz,wght@6..72,200..800&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --font-geist-sans: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-geist-mono: "Geist Mono", ui-monospace, SFMono-Regular, monospace;
    --font-display: "Newsreader", Georgia, "Times New Roman", serif;
  }
</style>
